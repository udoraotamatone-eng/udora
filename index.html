<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守護神ウドラ 神話降臨</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #080012 0%, #12002a 50%, #080018 100%);
  color: #e8d5ff;
  font-family: 'Georgia', serif;
  padding: 24px 16px 60px;
}
.container { max-width: 600px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 28px; }
.header .dragon { font-size: 44px; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 16px #c890ff); }
.header h1 {
  font-size: 22px; font-weight: bold; margin-bottom: 8px;
  background: linear-gradient(90deg, #f0c040, #d090ff, #f0c040);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 0.1em;
}
.header p { font-size: 12px; color: #7a60a0; letter-spacing: 0.15em; }

.apikey-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(200,150,255,0.25);
  border-radius: 14px; padding: 16px; margin-bottom: 16px;
}
.apikey-box label { font-size: 12px; color: #b090e0; display: block; margin-bottom: 8px; }
.apikey-box input {
  width: 100%; background: rgba(0,0,0,0.4);
  border: 1px solid rgba(200,150,255,0.3); border-radius: 8px;
  padding: 12px 14px; color: #e8d5ff; font-size: 14px;
  outline: none; font-family: monospace;
}
.apikey-box input::placeholder { color: #503870; }

.btn-area { display: flex; gap: 10px; margin-bottom: 20px; }
.btn-main {
  flex: 1; padding: 18px;
  background: linear-gradient(135deg, #5a25b0, #8a45e0);
  border: 1px solid rgba(200,150,255,0.4); border-radius: 14px;
  color: #fff; font-size: 18px; font-weight: bold;
  cursor: pointer; letter-spacing: 0.08em;
  box-shadow: 0 0 24px rgba(140,70,220,0.45);
  font-family: inherit; transition: opacity 0.2s;
}
.btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-reset {
  padding: 18px 22px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(200,150,255,0.2); border-radius: 14px;
  color: #9070c0; font-size: 18px; cursor: pointer;
  display: none; font-family: inherit;
}
.btn-reset.show { display: block; }

.loading { display: none; text-align: center; padding: 32px 0; color: #c090ff; font-size: 14px; letter-spacing: 0.1em; }
.loading.show { display: block; }
.loading .spark { font-size: 32px; display: block; margin-bottom: 12px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

.error-box {
  display: none; background: rgba(160,30,30,0.25);
  border: 1px solid rgba(220,80,80,0.45); border-radius: 12px;
  padding: 16px; color: #ff9090; font-size: 14px; margin-bottom: 16px; line-height: 1.7;
}
.error-box.show { display: block; }

.story { display: none; }
.story.show { display: block; }

.card { border-radius: 14px; margin-bottom: 14px; padding: 16px 20px; }
.card-ki    { background:#1e1448; border:1px solid #7c6af744; border-left:4px solid #7c6af7; }
.card-sho   { background:#0a2240; border:1px solid #4a90d944; border-left:4px solid #4a90d9; }
.card-ten   { background:#3a0c0c; border:1px solid #e05c5c44; border-left:4px solid #e05c5c; }
.card-ketsu { background:#0a2c1a; border:1px solid #4caf7d44; border-left:4px solid #4caf7d; }

.card-label { font-size: 12px; font-weight: bold; letter-spacing: 0.15em; margin-bottom: 10px; }
.card-ki    .card-label { color: #a090ff; }
.card-sho   .card-label { color: #70b0f0; }
.card-ten   .card-label { color: #ff9090; }
.card-ketsu .card-label { color: #80d0a0; }
.card-text { font-size: 15px; line-height: 2.1; color: #f0e8ff; letter-spacing: 0.04em; }

.shintaku {
  background: linear-gradient(135deg, rgba(240,192,64,0.10), rgba(180,100,255,0.10));
  border: 1px solid rgba(240,192,64,0.35); border-radius: 16px;
  padding: 24px 20px; text-align: center; margin: 6px 0 24px;
}
.shintaku-label { font-size: 11px; color: #c0a040; letter-spacing: 0.2em; margin-bottom: 14px; }
.shintaku-text { font-size: 17px; line-height: 2; color: #ffe090; font-style: italic; letter-spacing: 0.05em; }

.btn-next {
  display: block; width: 100%; padding: 16px;
  background: linear-gradient(135deg, #5a25b0, #8a45e0);
  border: 1px solid rgba(200,150,255,0.3); border-radius: 12px;
  color: #fff; font-size: 16px; cursor: pointer;
  letter-spacing: 0.08em; margin-bottom: 30px; font-family: inherit;
}

.footer { text-align: center; font-size: 10px; color: #3a2060; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="dragon">🐉</span>
    <h1>守護神ウドラ 神話降臨</h1>
    <p>── イヨウ王国の記憶 ──</p>
  </div>

  <div class="apikey-box">
    <label>🔑 OpenAI APIキー（sk-...）</label>
    <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx" />
  </div>

  <div class="btn-area">
    <button class="btn-main" id="btnMain" onclick="generate()">⚡ 神話降臨</button>
    <button class="btn-reset" id="btnReset" onclick="reset()">🔄</button>
  </div>

  <div class="loading" id="loading">
    <span class="spark">✨</span>
    神話の記憶が開かれる...
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="story" id="story">
    <div class="card card-ki">
      <div class="card-label">── 【起】──</div>
      <div class="card-text" id="p-起"></div>
    </div>
    <div class="card card-sho">
      <div class="card-label">── 【承】──</div>
      <div class="card-text" id="p-承"></div>
    </div>
    <div class="card card-ten">
      <div class="card-label">── 【転】──</div>
      <div class="card-text" id="p-転"></div>
    </div>
    <div class="card card-ketsu">
      <div class="card-label">── 【結】──</div>
      <div class="card-text" id="p-結"></div>
    </div>
    <div class="shintaku">
      <div class="shintaku-label">🌟 ── ウドラ様の神託 ── 🌟</div>
      <div class="shintaku-text" id="p-神託"></div>
    </div>
    <button class="btn-next" onclick="generate()">⚡ 次の神話を召喚</button>
  </div>

  <div class="footer">守護神ウドラ様 © イヨウ王国</div>
</div>

<script>
const PLACES = ["山あいの村","霧の森のほとり","海辺の小さな港","石の橋がかかる川辺の町","星をまつる高原の集落","赤い塔が見える城下町","古い井戸のある村","白い花畑に囲まれた里","断崖の上に建つ灯台の町","深い森に隠れた神殿の村","雪に閉ざされた山奥の集落","大河のほとりの交易の町","砂に埋もれた古い遺跡の村","湖の中央に浮かぶ小島の里","黒い岩に囲まれた海岸の村","霜に覆われた朝の高地の集落","風鳴りの谷に寄り添う石造りの町","赤土の丘に広がるぶどう畑の村","古い水車が回る川沿いの里","祭りの太鼓が響く平野の村","金色の麦畑に囲まれた宿場町","流星を祀る丘の上の神域","珊瑚の浜辺を持つ南の漁村","雲海を見下ろす崖上の砦町","夜だけ灯がともる森の市場","春霞に包まれた梅の里","白蛇伝承が残る渓谷の集落"];
const HEROES = ["薪を集める少年","水くみをする少女","鐘を守る老人","畑をたがやす若者","パンを焼く娘","羊を追う子ども","薬草を集める母親","橋守の男","漁に出る若い漁師","井戸を管理する少女","風車を見守る老人","市場で働く少年","牛を世話する娘","森の道案内をする男","星を観測する子ども","灯を守る神殿の侍女","書庫を掃除する青年","染物を干す職人","舟を修理する老人","蜂を育てる娘","塩を運ぶ若者","石碑を磨く少年","薬師の手伝いをする少女","古地図を写す書記","山道を直す木こり","陶器を焼く職人","旅人を迎える宿の娘","橋のたもとで笛を吹く子ども","畑の水路を守る老人","年老いた父と漁に出る息子","病の母を看る娘","夫の残した舟を修理する妻","妹のために薬草を集める兄"];
const TYPES = ["覚醒","試練","日常","逆転","神視点","過去","象徴","赦し","継承","選択","再起","別れ","すれ違い","交換","守護","初恋","再会","縁","討伐","封印","降臨","契約"];
const TROUBLES = ["大切なものを失いかけた","進むべき道が分からなくなった","誰を信じるべきか迷った","守るべき約束を思い出せなくなった","大事な役目から逃げたくなった","言うべき言葉を飲み込んでいた","選ばなければならない時を迎えた","誰にも言えない願いを抱えていた","失くした声を探していた","古い約束の重さに苦しんでいた","本当の望みを口にできずにいた","過去の失敗を引きずっていた"];

const pick = a => a[Math.floor(Math.random()*a.length)];

function buildPrompt() {
  return `あなたは神話の語り部です。視聴者を引き込む、ドラマチックで壮大な神話を作ること。
毎回、これまでと全く異なる展開・出来事・結末を作ること。

■舞台: ${pick(PLACES)}
■主人公: ${pick(HEROES)}
■今回の物語型（必ず守ること）: ${pick(TYPES)}
■問題候補（使わなくてもよい）: ${pick(TROUBLES)}

■起承転結の役割
【起】舞台・人物・空気感を見せる。日常の中に伏線を1つ仕込むこと。
【承】起で作った世界に変化が起きる。緊張感・不穏さ・ドラマが生まれること。
【転】★最重要★驚き・真実の暴露・戦い・逆転のいずれかが起きること。起承と同じトーンで進むことは禁止。
【結】転の結果、主人公が何を得たか・失ったかを描く。ハッピーエンドにしないこと。教訓は書かない。

■絶対条件
・内面語（気づく・考えた・決意した・思った・感じた）は禁止。身体の動作・行動で描写すること。
・各パート60〜100文字
・日本神話・和風要素（巫女・神社・鳥居）は禁止

■必ずこの形式で返すこと
【起】...
【承】...
【転】...
【結】...
【神託】教訓を短く力強い一文で。ウドラ様のセリフとして。三人称禁止。セリフのみ。`;
}

function parseStory(text) {
  const parts = {};
  for (const k of ["起","承","転","結","神託"]) {
    const m = text.match(new RegExp(`【${k}】([\\s\\S]*?)(?=【|$)`));
    if (m) parts[k] = m[1].trim();
  }
  return parts;
}

function show(id) { document.getElementById(id).classList.add('show'); }
function hide(id) { document.getElementById(id).classList.remove('show'); }

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('OpenAI APIキーを入力してください'); return; }

  const btn = document.getElementById('btnMain');
  btn.disabled = true;
  btn.textContent = '⏳ 神話編纂中...';
  show('btnReset'); show('loading');
  hide('errorBox'); hide('story');

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{ role: 'user', content: buildPrompt() }],
        temperature: 1.05,
        max_tokens: 900
      })
    });

    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.error?.message || 'APIエラー (' + res.status + ')');
    }

    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '';
    const parts = parseStory(text);
    if (!parts['起']) throw new Error('神話の生成に失敗しました');

    for (const k of ['起','承','転','結','神託']) {
      const el = document.getElementById('p-' + k);
      if (el) el.textContent = parts[k] || '';
    }

    hide('loading'); show('story');
    btn.disabled = false; btn.textContent = '⚡ 神話降臨';

  } catch(e) {
    hide('loading');
    const eb = document.getElementById('errorBox');
    eb.textContent = '❌ ' + e.message;
    show('errorBox');
    btn.disabled = false; btn.textContent = '⚡ 神話降臨';
  }
}

function reset() {
  const btn = document.getElementById('btnMain');
  btn.disabled = false; btn.textContent = '⚡ 神話降臨';
  hide('btnReset'); hide('loading'); hide('errorBox'); hide('story');
}
</script>
</body>
</html>
